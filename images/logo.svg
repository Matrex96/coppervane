<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340" aria-labelledby="logoTitle" role="img">
  <title id="logoTitle">KSB REPIPE Logo</title>
  <desc>Vector recreation of KSB REPIPE logo with transparent background</desc>

  <defs>
    <!-- Pipe gradient - blue tones matching original -->
    <linearGradient id="pipeGradient" x1="20%" y1="10%" x2="80%" y2="90%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="35%" stop-color="#29B6F6"/>
      <stop offset="65%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    
    <!-- Subtle darker gradient overlay for depth on pipe -->
    <linearGradient id="pipeShadow" x1="30%" y1="0%" x2="70%" y2="100%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D47A1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0D47A1" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- KSB Group -->
  <g id="ksb-group">
    <!-- K -->
    <text 
      x="55" 
      y="155" 
      font-family="Arial Black, 'Arial Black', Gadget, sans-serif" 
      font-size="138" 
      font-weight="900" 
      fill="#0F284D"
      letter-spacing="-2">K</text>

    <!-- The stylized S as pipe -->
    <!-- Main pipe body - thick rounded stroke forming S curve -->
    <path 
      d="M 215 52 
         C 275 48, 295 85, 265 120 
         C 235 155, 255 190, 295 215 
         C 335 240, 315 282, 260 285" 
      fill="none" 
      stroke="url(#pipeGradient)" 
      stroke-width="44" 
      stroke-linecap="round" 
      stroke-linejoin="round" />

    <!-- Subtle depth overlay on pipe -->
    <path 
      d="M 215 52 
         C 275 48, 295 85, 265 120 
         C 235 155, 255 190, 295 215 
         C 335 240, 315 282, 260 285" 
      fill="none" 
      stroke="url(#pipeShadow)" 
      stroke-width="44" 
      stroke-linecap="round" 
      stroke-linejoin="round" />

    <!-- Top pipe flange / end detail -->
    <path 
      d="M 200 45 Q 218 50, 235 46" 
      fill="none" 
      stroke="#0D47A1" 
      stroke-width="13" 
      stroke-linecap="round" />

    <!-- Bottom pipe flange / end detail -->
    <path 
      d="M 248 290 Q 265 292, 282 288" 
      fill="none" 
      stroke="#0D47A1" 
      stroke-width="13" 
      stroke-linecap="round" />

    <!-- B -->
    <text 
      x="355" 
      y="155" 
      font-family="Arial Black, 'Arial Black', Gadget, sans-serif" 
      font-size="138" 
      font-weight="900" 
      fill="#0F284D"
      letter-spacing="-2">B</text>
  </g>

  <!-- REPIPE text below -->
  <text 
    x="55" 
    y="255" 
    font-family="Arial, Helvetica, 'Helvetica Neue', sans-serif" 
    font-size="39" 
    font-weight="700" 
    fill="#444444" 
    letter-spacing="11">REPIPE</text>

</svg>
