<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>KSB Repipe — Private Preview</title>
<link rel="icon" href="images/logo.png" type="image/png">
<style>
  :root {
    --bg: #1b242f; --panel: #242f3c; --line: #374654; --ink: #eef3f6;
    --soft: #a2b4c1; --faint: #74869a; --accent: #d98a52; --accent-2: #b96b39;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif; background: var(--bg); color: var(--ink);
    line-height: 1.6; -webkit-font-smoothing: antialiased;
    min-height: 100dvh; display: grid; place-items: center; padding: 24px;
  }
  main { width: 100%; max-width: 380px; }
  .logo { height: 72px; width: auto; display: block; margin: 0 auto 30px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 28px; }
  .card h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: -.01em; }
  .card .hint { color: var(--faint); font-size: .84rem; margin-top: 4px; margin-bottom: 20px; }
  label { display: block; font-size: .86rem; font-weight: 600; color: var(--soft); margin: 14px 0 7px; }
  input {
    width: 100%; font-family: inherit; font-size: 1rem; color: var(--ink);
    background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent); }
  button {
    width: 100%; margin-top: 22px; cursor: pointer; font-family: inherit; font-size: 1rem; font-weight: 700;
    color: #160c05; background: var(--accent); border: none; border-radius: 999px; padding: 13px;
    transition: background .2s, transform .12s;
  }
  button:hover { background: var(--accent-2); transform: translateY(-1px); }
  .err { color: var(--accent); font-size: .88rem; font-weight: 600; margin-top: 14px; min-height: 1.4em; }
  footer { text-align: center; color: var(--faint); font-size: .76rem; margin-top: 22px; }
</style>
</head>
<body>
<main>
  <img class="logo" src="images/logo-dark.png" alt="KSB Repipe">
  <div class="card">
    <h1>Private preview</h1>
    <div class="hint">This site isn&rsquo;t public yet — please sign in.</div>
    <form id="f" autocomplete="off">
      <label for="u">Username</label>
      <input id="u" type="text" autocapitalize="none" autofocus>
      <label for="p">Password</label>
      <input id="p" type="password">
      <button type="submit">Sign in →</button>
      <div class="err" id="err"></div>
    </form>
  </div>
  <footer>KSB Repipe · demonstration preview</footer>
</main>
<script>
const USER_H = 'cf3a3bbe331c3950d16a8e9917c5bb8340e7c0ef917da25d4a96f92d074bce05';
const PASS_H = '1fc0d36610eda8c88534c3b720f601456e8aaff06f8e71d83398e9db0a4399b0';
/* self-contained SHA-256 — works even without crypto.subtle (plain-http contexts) */
function sha256(ascii) {
  function rightRotate(v, a){ return (v>>>a) | (v<<(32-a)); }
  var mathPow = Math.pow, maxWord = mathPow(2,32), result = '';
  var words = [], asciiBitLength = ascii.length*8;
  var hash = sha256.h = sha256.h || [], k = sha256.k = sha256.k || [], primeCounter = k.length;
  var isComposite = {};
  for (var candidate = 2; primeCounter < 64; candidate++) {
    if (!isComposite[candidate]) {
      for (var i = 0; i < 313; i += candidate) isComposite[i] = candidate;
      hash[primeCounter] = (mathPow(candidate, .5)*maxWord)|0;
      k[primeCounter++] = (mathPow(candidate, 1/3)*maxWord)|0;
    }
  }
  ascii += '\x80';
  while (ascii.length%64 - 56) ascii += '\x00';
  for (i = 0; i < ascii.length; i++) {
    var j = ascii.charCodeAt(i);
    if (j>>8) return;
    words[i>>2] |= j << ((3-i)%4)*8;
  }
  words[words.length] = ((asciiBitLength/maxWord)|0);
  words[words.length] = (asciiBitLength);
  for (j = 0; j < words.length;) {
    var w = words.slice(j, j += 16), oldHash = hash;
    hash = hash.slice(0, 8);
    for (i = 0; i < 64; i++) {
      var w15 = w[i-15], w2 = w[i-2];
      var a = hash[0], e = hash[4];
      var temp1 = hash[7]
        + (rightRotate(e,6) ^ rightRotate(e,11) ^ rightRotate(e,25))
        + ((e&hash[5])^((~e)&hash[6]))
        + k[i]
        + (w[i] = (i<16) ? w[i] : (w[i-16] + (rightRotate(w15,7)^rightRotate(w15,18)^(w15>>>3)) + w[i-7] + (rightRotate(w2,17)^rightRotate(w2,19)^(w2>>>10)))|0);
      var temp2 = (rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22)) + ((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash = [(temp1+temp2)|0].concat(hash);
      hash[4] = (hash[4]+temp1)|0;
    }
    for (i = 0; i < 8; i++) hash[i] = (hash[i]+oldHash[i])|0;
  }
  for (i = 0; i < 8; i++) for (j = 3; j+1; j--) {
    var b = (hash[i]>>(j*8))&255;
    result += ((b<16)?0:'') + b.toString(16);
  }
  return result;
}
document.getElementById('f').onsubmit = e => {
  e.preventDefault();
  const u = document.getElementById('u').value.trim().toLowerCase();
  const p = document.getElementById('p').value;
  if (sha256(u) === USER_H && sha256(p) === PASS_H) {
    sessionStorage.setItem('ksbAuth', 'yes');
    location.replace('home.html');
  } else {
    document.getElementById('err').textContent = 'Wrong username or password.';
    document.getElementById('p').value = '';
  }
};
if (sessionStorage.getItem('ksbAuth') === 'yes') location.replace('home.html');
</script>
</body>
</html>
